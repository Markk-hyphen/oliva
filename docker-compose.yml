services:
  database:
    image: pgvector/pgvector:pg${POSTGRES_VERSION:-15}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-app}"]
      interval: 10s
      retries: 5
      timeout: 5s

  rabbitmq:
    image: rabbitmq:3-management
    profiles: ["queues"]
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-app}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5
      timeout: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
      - .env.backend
    depends_on:
      database:
        condition: service_healthy
    expose:
      - "80/tcp"
    networks:
      app_network:
        aliases:
          - backend.${SERVER_NAME}

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Opt-in: solo arranca si se activa el profile `cron` (--profile cron o
    # listándolo explícito en `up`). Una app sin tareas periódicas no lo levanta
    # y no paga un container corriendo un crontab vacío. Mismo criterio que
    # `rabbitmq` (profile `queues`). Cada fork que necesite cron activa el
    # profile y llena `backend/scheduler/crontab`.
    profiles: ["cron"]
    restart: unless-stopped
    env_file:
      - .env
      - .env.backend
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
      - .env.frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
    name: app_network

volumes:
  db_data:
  rabbitmq_data: