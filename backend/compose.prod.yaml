# Production environment override
services:
  backend:
    image: app-backend-prod:1.0
    build:
      context: .
      dockerfile: Dockerfile
      target: frankenphp_prod
      args:
        SYMFONY_VERSION: ${SYMFONY_VERSION}
        STABILITY: ${STABILITY}
    env_file:
      - .env
    environment:
      - APP_ENV=production
