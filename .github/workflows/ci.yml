name: CI

on:
  push:
    branches:
      - main
      - release/plan-market-pulse
  pull_request: ~
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4

      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      -
        name: Set up environment files
        run: |
          cp .env.example .env
          sed -i 's/your_db_password/app/g' .env
          sed -i 's/your_rabbitmq_password/app/g' .env
          cat > .env.backend << 'EOF'
          APP_SECRET=ci_secret_change_in_prod_32chars
          SERVER_NAME=0.0.0.0:80
          HTTP_PORT=80
          CADDY_GLOBAL_OPTIONS=#
          CADDY_EXTRA_CONFIG=#
          CADDY_SERVER_LOG_OPTIONS=#
          JWT_PASSPHRASE=ci_jwt_passphrase
          RABBITMQ_USER=app
          RABBITMQ_PASSWORD=app
          RABBITMQ_DSN=amqp://app:app@rabbitmq:5672/%2f
          MERCURE_PUBLISHER_JWT_KEY=aabbccddeeff00112233445566778899aabbccddeeff00112233445566778899
          MERCURE_JWT_SECRET=aabbccddeeff00112233445566778899aabbccddeeff00112233445566778899
          MERCURE_URL=http://localhost/.well-known/mercure
          MERCURE_PUBLIC_URL=http://localhost/.well-known/mercure
          EOF

      -
        name: Build Docker images
        run: docker compose build

      -
        name: Start services
        run: docker compose up --wait --no-build

      -
        name: Dump service logs on failure
        if: failure()
        run: docker compose logs --tail 80

      -
        name: Check HTTP reachability
        run: curl -v --fail-with-body http://localhost/health

      -
        name: Check Mercure reachability
        run: curl -v --fail-with-body "http://localhost/.well-known/mercure?topic=test"

      -
        name: Run migrations
        run: docker compose exec -T backend bin/console doctrine:migrations:migrate --no-interaction

      -
        name: Doctrine Schema Validator
        run: docker compose exec -T backend bin/console doctrine:schema:validate

      -
        name: Run PHPUnit
        run: docker compose exec -T backend php vendor/bin/phpunit

  lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4

      -
        name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
