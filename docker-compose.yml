version: "3.8"

services:
  database:
    image: postgres:${POSTGRES_VERSION:-15}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-app}"]
      interval: 10s
      retries: 5
      timeout: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SYMFONY_VERSION: ${SYMFONY_VERSION}
        STABILITY: ${STABILITY}
    restart: unless-stopped
    env_file:
      - .env
      - .env.backend
    depends_on:
      database:
        condition: service_healthy
    expose:
      - "80/tcp"
    networks:
      app_network:
        aliases:
          - backend.${SERVER_NAME}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
      - .env.frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
    name: app_network

volumes:
  db_data: