# Development overrides
services:
  database:
    ports:
      - "5432:5432"

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"

  worker:
    image: app-backend-dev:1.0
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: frankenphp_dev
    command: ["bin/console", "messenger:consume", "ingest", "enrich", "--time-limit=3600", "-vv"]
    restart: unless-stopped
    env_file:
      - .env
      - .env.backend
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/.env:/app/.env:ro
      - ./backend/src:/app/src
      - ./backend/migrations:/app/migrations
      - ./backend/config:/app/config
    environment:
      APP_ENV: development
    networks:
      - app_network
    tty: true

  backend:
    image: app-backend-dev:1.0
    build:
      target: frankenphp_dev
    ports:
      - "80:80"
    volumes:
      - ./backend/.env:/app/.env:ro
      - ./backend/src:/app/src
      - ./backend/migrations:/app/migrations
      - ./backend/public:/app/public
      - ./backend/frankenphp/Caddyfile:/etc/caddy/Caddyfile
      - ./backend/frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      - ./backend/config:/app/config
    environment:
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      APP_ENV: development
    extra_hosts:
      - host.docker.internal:host-gateway
    tty: true

  frontend:
    image: app-frontend-dev:1.0
    build:
      target: development
      args:
        NODE_ENV: development
    environment:
      - VITE_API_URL=http://backend:80
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    tty: true