version: "3.8"
# This file defines frontend-specific configurations for development.

services:
  backend:
    image: app-backend-dev:1.0
    ports:
      - "8000:8000"

  frontend:
    image: app-frontend-dev:1.0
    environment:
      - VITE_API_URL=http://backend:8000
    ports:
      - "3000:3000"